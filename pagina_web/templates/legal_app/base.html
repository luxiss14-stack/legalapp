<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Legal Management{% endblock %}</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        nav{
            background:#1f2937;
            color:white;
            padding:15px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav h2{
            font-size:24px;
        }

        nav ul{
            list-style:none;
            display:flex;
            gap:20px;
        }

        nav a{
            color:white;
            text-decoration:none;
            font-weight:bold;
        }

        nav a:hover{
            color:#60a5fa;
        }

        .container{
            width:90%;
            max-width:1100px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        input,
        textarea,
        select{
            width:100%;
            padding:10px;
            margin-top:8px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            background:#2563eb;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        table th,
        table td{
            border:1px solid #ddd;
            padding:12px;
        }

        table th{
            background:#2563eb;
            color:white;
        }

        .card{
            border:1px solid #ddd;
            border-radius:8px;
            padding:15px;
            margin-bottom:15px;
        }

        .chat-box{
            border:1px solid #ddd;
            height:400px;
            overflow-y:auto;
            padding:20px;
            margin-bottom:20px;
            border-radius:8px;
        }

        .lawyer{
            background:#dbeafe;
            padding:10px;
            border-radius:8px;
            margin-bottom:10px;
            text-align:right;
        }

        .client{
            background:#dcfce7;
            padding:10px;
            border-radius:8px;
            margin-bottom:10px;
            text-align:left;
        }
    </style>

    {% block extra_css %}
    {% endblock %}
</head>

<body>

<nav>

    <h2>Legal Management</h2>

    <ul>
        <li><a href="{% url 'home' %}">Home</a></li>
        <li><a href="{% url 'client_list' %}">Clients</a></li>
        <li><a href="{% url 'lawyer_list' %}">Lawyers</a></li>
        <li><a href="{% url 'register_client' %}">Register Client</a></li>
        <li><a href="{% url 'register_lawyer' %}">Register Lawyer</a></li>
    </ul>

</nav>

<div class="container">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
